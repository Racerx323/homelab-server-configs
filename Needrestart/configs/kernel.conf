# Install as /etc/needrestart/conf.d/kernel.conf.
# https://github.com/liske/needrestart/blob/master/README.raspberry.md
# This configuration is only for a Raspberry Pi 5 running the 16KB-page
# *-rpi-2712 kernel. Verify that `uname -r` ends in "-2712" before installing.
# Raspberry Pi systems install multiple kernel variants in parallel, so filter
# the image filenames to the variant that this host boots.
# rpi8-rpi-v8 (4KB page size; use this instead on a host booting *-v8)
# $nrconf{kernelfilter} = qr(vmlinuz-.*-v8$);
# rpi8-rpi-2712 (16KB page size; active configuration)
$nrconf{kernelfilter} = qr(vmlinuz-.*-2712$);
